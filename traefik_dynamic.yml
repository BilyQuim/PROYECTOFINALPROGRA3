http:
  routers:
    frontend-router:
      rule: "PathPrefix(`/`)"
      service: frontend
      priority: 1

    auth-router:
      rule: "PathPrefix(`/auth`)"  
      service: auth
      middlewares:
        - auth-strip-prefix
      priority: 100
    rest-router:
      rule: "PathPrefix(`/rest`)" 
      service: rest
      middlewares:
        - rest-strip-prefix
      priority: 100

    graphql-router:
      rule: "PathPrefix(`/graphql`)" 
      service: graphql
      priority: 100

  middlewares:
    auth-strip-prefix:
      stripPrefix:
        prefixes:
          - "/auth"

    rest-strip-prefix:
      stripPrefix:
        prefixes:
          - "/rest"

  services:
    frontend:
      loadBalancer:
        servers:
          - url: "http://frontend:80"

    auth:
      loadBalancer:
        servers:
          - url: "http://auth-service:8000"
    rest:
      loadBalancer:
        servers:
          - url: "http://rest-service:8000"
    graphql:
      loadBalancer:
        servers:
          - url: "http://graphql-service:8000"