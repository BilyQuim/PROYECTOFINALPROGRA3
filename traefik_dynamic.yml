http:
  routers:
    auth-router:
      rule: "PathPrefix(`/auth`)"   # <-- Simplificado: Quitamos /api/v1
      service: auth
    rest-router:
      rule: "PathPrefix(`/rest`)"   # <-- Simplificado: Quitamos /api/v1
      service: rest

    graphql-router:
      rule: "PathPrefix(`/graphql`)" # <-- Este ya lo tienes limpio y funcionando
      service: graphql

  services:
    auth:
      loadBalancer:
        servers:
          - url: "http://auth-service:8000" # <-- Conecta con el nombre del contenedor en el compose
    rest:
      loadBalancer:
        servers:
          - url: "http://rest-service:8000"
    graphql:
      loadBalancer:
        servers:
          - url: "http://graphql-service:8000"