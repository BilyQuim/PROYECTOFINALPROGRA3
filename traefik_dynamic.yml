http:
  routers:
    auth-router:
      rule: "PathPrefix(`/auth`)"  
      service: auth
      middlewares:
        - auth-strip-prefix
    rest-router:
      rule: "PathPrefix(`/rest`)" 
      service: rest
      middlewares:
        - rest-strip-prefix

    graphql-router:
      rule: "PathPrefix(`/graphql`)" 
      service: graphql
      middlewares:
        - graphql-strip-prefix

  middlewares:
    auth-strip-prefix:
      stripPrefix:
        prefixes:
          - "/auth"

    rest-strip-prefix:
      stripPrefix:
        prefixes:
          - "/rest"

    graphql-strip-prefix:
      stripPrefix:
        prefixes:
          - "/graphql"

  services:
    auth:
      loadBalancer:
        servers:
          - url: "http://auth-service:8000"
    rest:
      loadBalancer:
        servers:
          - url: "http://rest-service:8000"
    graphql:
      loadBalancer:
        servers:
          - url: "http://graphql-service:8000"